name: Documentation

# Builds and deploys the Fumadocs static site to GitHub Pages.
# Every push to `main` deploys to the root — docs always reflect the latest main.

on:
  push:
    branches: [main]

concurrency:
  group: docs-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy docs
    runs-on: ubuntu-slim
    permissions:
      contents: write  # JamesIves/github-pages-deploy-action pushes to gh-pages

    steps:
      - uses: actions/checkout@v6
        name: Checkout code

      - uses: pnpm/action-setup@v5
        name: Setup pnpm
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @terrably/docs

      - name: Build docs
        run: pnpm run build
        working-directory: packages/docs
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Add .nojekyll
        run: touch packages/docs/out/.nojekyll

      - name: Deploy docs → gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages/docs/out
          clean: true
