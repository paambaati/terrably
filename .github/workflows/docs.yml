name: Documentation

# Builds and deploys the Fumadocs static site to GitHub Pages.
# Every push to `main` deploys to the root — docs always reflect the latest main.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/docs/**'

concurrency:
  group: docs-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & deploy docs
    runs-on: ubuntu-slim
    env:
      NEXT_TELEMETRY_DISABLED: 1
      DO_NOT_TRACK: 1
    permissions:
      contents: write  # JamesIves/github-pages-deploy-action pushes to gh-pages

    steps:
      - uses: actions/checkout@v6
        name: Checkout code

      - uses: pnpm/action-setup@v5
        name: Setup pnpm
        with:
          version: 10

      - uses: actions/setup-node@v6
        name: Setup Node
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @terrably/docs

      - uses: actions/cache@v5
        name: Set up Next.js build cache
        with:
          path: ${{ github.workspace }}/packages/docs/.next/cache
          # New cache when packages or source files change; fall back to any prior Next.js cache.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('packages/docs/**/*.{js,jsx,ts,tsx,mdx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build docs
        run: pnpm run build
        working-directory: packages/docs
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Add .nojekyll
        run: touch packages/docs/out/.nojekyll

      - name: Deploy docs
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: packages/docs/out
          branch: gh-pages
          clean: true
