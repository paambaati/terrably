name: Release + Publish

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs['packages/sdk--release_created'] }}
      tag_name: ${{ steps.release.outputs['packages/sdk--tag_name'] }}

    steps:
      - uses: googleapis/release-please-action@v4
        name: Release
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC) + automatic provenance

    steps:
      - uses: actions/checkout@v6
        name: Checkout code

      - uses: pnpm/action-setup@v5
        name: Setup pnpm
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        working-directory: packages/sdk

      - name: Test
        run: pnpm run test
        working-directory: packages/sdk

      - name: Lint
        run: pnpm run lint
        working-directory: packages/sdk

      # Authenticates via OIDC — no NPM_TOKEN secret needed.
      # Provenance attestations are generated automatically by the registry.
      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/sdk
